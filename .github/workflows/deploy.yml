name: Actualizar datos

on:
  schedule:
    - cron: '0 6 * * *'  # Ejecuta todos los días a las 6:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update_figures:
    runs-on: ubuntu-latest

    env:
      COPERNICUS_USERNAME: ${{ secrets.COPERNICUS_USERNAME }}
      COPERNICUS_PASSWORD: ${{ secrets.COPERNICUS_PASSWORD }}

    steps:
      # 1️⃣ Clonar el repositorio
      - name: Checkout repo
        uses: actions/checkout@v3

      # 2️⃣ Configurar Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      # 3️⃣ Instalar dependencias
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade copernicusmarine
          pip install numpy matplotlib cartopy xarray h5py netCDF4 scipy

      # 4️⃣ Ejecutar script
      - name: Run auto script
        run: python scripts/script_auto.py

      # 5️⃣ Verificar que las figuras existen (opcional pero recomendado)
      - name: List generated figures
        run: ls -l figures/

      # 6️⃣ Commit + push todas las figuras
      - name: Commit and push figures
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add figures/*
          git commit -m "Actualizar figuras automáticamente" || echo "No changes to commit"
          git pull --rebase origin main
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git main
